<div class="admin-main">
  <div class="white-card">
    
    <div class="section-header">
      <div class="dot"></div>
      <span>Nouvelle Demande de Crédit</span>
    </div>

    <form [formGroup]="creditForm" (ngSubmit)="onSubmit()">
      
      <div class="row">
        <div class="col-md-6 form-group">
          <label>Montant du crédit (TND)</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-hand-holding-dollar"></i>
            <input type="number" formControlName="montant" placeholder="Ex: 5000">
          </div>
        </div>

        <div class="col-md-6 form-group">
          <label>Durée (Mois)</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-clock"></i>
            <input type="number" formControlName="duree" placeholder="Ex: 24">
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 form-group">
          <label>Revenu Mensuel</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-wallet"></i>
            <input type="number" formControlName="revenuMensuel">
          </div>
        </div>

        <div class="col-md-6 form-group">
          <label>Objet du crédit</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-list"></i>
            <select formControlName="objetCredit">
              <option value="immobilier">Immobilier</option>
              <option value="automobile">Automobile</option>
              <option value="consommation">Consommation</option>
            </select>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between mt-4">
        <button type="button" class="admin-button" routerLink="/client">
          Annuler
        </button>
        <button type="button" class="admin-button primary" (click)="onSubmit()" [disabled]="creditForm.invalid">
          Analyser le dossier <i class="fa-solid fa-bolt"></i>
        </button>
      </div>

    </form>
  </div>
</div>
