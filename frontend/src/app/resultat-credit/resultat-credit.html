<div class="admin-main">
  <div class="white-card">
    
    <h2 style="margin-bottom: 30px; font-weight: 700;">Résultat de l'Analyse IA</h2>

    <div class="score-circle">
      <span class="score-value">{{score}}%</span>
      <span class="score-label">Fiabilité</span>
    </div>

    <div class="decision-box">
      <h3><i class="fa-solid fa-circle-check"></i> Décision : {{decision}}</h3>
      <p style="opacity: 0.9; font-size: 0.95rem;">
        Votre profil présente un risque faible. L'algorithme a validé votre capacité de remboursement.
      </p>
    </div>

    <p style="font-size: 0.85rem; opacity: 0.6; margin-bottom: 25px;">
      *Cette analyse a été générée automatiquement par le module de scoring Vermeg.
    </p>

    <a routerLink="/client" class="admin-button">
      <i class="fa-solid fa-house"></i> Retour à l'accueil
    </a>

  </div>
</div>
