<div class="login-container">
  <div class="header-logo">
    <img src="assets/vermeg.png" alt="Vermeg Logo" class="vermeg-logo">
  </div>

  <div class="login-card">
    <div class="theme-toggle" (click)="toggleTheme()">
      <i [class]="themeService.isDarkMode() ? 'fas fa-sun' : 'fas fa-moon'"></i>
    </div>

    <h2 class="main-title">Agent Login</h2>

    <form [formGroup]="agentForm" (ngSubmit)="onAgentLogin()">
      <div class="input-field">
        <label>Matricule Agent</label>
        <input type="text" formControlName="matricule"placeholder="matricule">
      </div>

      <div class="input-field">
        <label>Mot de passe</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••">
          <span class="toggle-eye" (click)="togglePassword()">
             <i [class]="showPassword ? 'fas fa-eye' : 'fas fa-eye-slash'"></i>
          </span>
        </div>
      </div>
<div class="captcha-mock">
        <input type="checkbox" id="robot" name="robot">
        <label for="robot">Je ne suis pas un robot</label>
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/RecaptchaLogo.svg" alt="captcha" width="25">
      </div>
      <div class="actions-row" style="display: flex; gap: 10px; margin-top: 20px;">
      <button type="submit" class="btn-login" style="flex: 1;" [disabled]="agentForm.invalid">Connexion</button>
    <button type="reset" class="btn-cancel" style="flex: 1;">Annuler</button>
</div>
    </form>
  </div> 
</div>
